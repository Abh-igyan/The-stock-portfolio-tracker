# ─── Application ───────────────────────────────────────────────────────────────
spring.application.name=stock-portfolio-api
server.port=${PORT:8080}

# ─── Database ──────────────────────────────────────────────────────────────────
# Railway injects MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD automatically.
# Local development: set these in your .env or IDE run config.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# ─── JSON ──────────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL
